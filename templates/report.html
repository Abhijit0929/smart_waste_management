<!DOCTYPE html>
<html>
<head>
    <title>Report Waste</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4 text-green-600">
Report Garbage
</h2>

<form method="POST">

{% csrf_token %}

<!-- Map -->
<div id="map" class="h-96 mb-4 rounded"></div>

<!-- Hidden fields for coordinates -->
<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<!-- Location -->
<label class="block mb-1 font-semibold">Location</label>
<input
type="text"
name="location"
id="location"
placeholder="Click on map to auto-fill location"
class="border p-2 w-full mb-3 rounded"
/>

<!-- Description -->
<label class="block mb-1 font-semibold">Description</label>
<textarea
name="description"
placeholder="Describe the garbage problem"
class="border p-2 w-full mb-4 rounded"
></textarea>

<button
class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"
>
Submit Report
</button>

</form>

</div>

<script>

// Initialize map
var map = L.map('map').setView([18.6298, 73.7997], 13); // Pimpri default

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker;

// When user clicks on map
map.on('click', function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    // Store coordinates
    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lon;

    // Remove old marker
    if(marker){
        map.removeLayer(marker)
    }

    // Add new marker
    marker = L.marker([lat,lon]).addTo(map);

    // Reverse geocoding to get location name
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(response => response.json())
    .then(data => {

        var locationName = data.display_name;

        // Fill input field
        document.getElementById("location").value = locationName;

        // Show popup
        marker.bindPopup(locationName).openPopup();

    })

})

</script>

</body>
</html>
